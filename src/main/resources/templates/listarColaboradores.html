<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro de Colaboradores</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #64748b;
            --danger-color: #ef4444;
            --success-color: #22c55e;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-weight: 600;
            margin-bottom: 30px;
            color: #0f172a;
        }

        .table-container {
            width: 100%;
            max-width: 1100px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background-color: #f1f5f9;
        }

        th {
            padding: 16px;
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--secondary-color);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .colaborador-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e2e8f0;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            background: #f1f5f9;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .btn {
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-details { background: #e0e7ff; color: var(--primary-color); }
        .btn-details:hover { background: var(--primary-color); color: white; }

        .btn-edit { background: #f1f5f9; color: var(--secondary-color); }
        .btn-edit:hover { background: #cbd5e1; }

        .btn-delete { background: #fee2e2; color: var(--danger-color); }
        .btn-delete:hover { background: var(--danger-color); color: white; }

    </style>
</head>
<body>

<h1>Gestão de Colaboradores</h1>

<div class="table-container">
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Perfil</th>
            <th>Nome</th>
            <th>Função</th>
            <th>E-mail</th>
            <th>Contrato</th>
            <th>Atividade Atual</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="colaborador : ${colaboradores}">
            <td th:text="${colaborador.id}" style="color: #94a3b8; font-size: 0.8rem;"></td>
            <td>
                <img th:src="${colaborador.imgUrl}" class="colaborador-img">
            </td>
            <td th:text="${colaborador.nome}" style="font-weight: 500;"></td>
            <td th:text="${colaborador.funcao}"></td>
            <td th:text="${colaborador.email}"></td>
            <td>
                <span class="badge" th:text="${colaborador.modeloContratacao}"></span>
            </td>
            <td>
                <div th:if="${colaborador.atividades}">
                    <strong th:text="${colaborador.atividades.nome}"></strong><br>
                    <small th:text="'Nível: ' + ${colaborador.atividades.dificuldade}" style="color: #64748b;"></small>
                </div>
                <span th:unless="${colaborador.atividades}" style="color: #cbd5e1; font-style: italic;">Pendente</span>
            </td>
            <td>
                <div class="btn-group">
                    <a href="#" class="btn btn-details">Ver</a>
                    <a href="#" class="btn btn-edit">Editar</a>
                    <a th:href="@{/colaboradores/ui/deletar/{id}(id=${colaborador.id})}"
                       class="btn btn-delete"
                       onclick="return confirm('Tem certeza que deseja excluir?')">Excluir</a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
