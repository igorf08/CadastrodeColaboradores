<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Colaborador</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/adicionarColaborador.css}" />
</head>
<body>

<h1>Novo Colaborador</h1>

<div class="form-card">
    <div th:if="${mensagem}" class="mensagem" th:text="${mensagem}"></div>

    <form th:action="@{/colaboradores/ui/salvar}" th:object="${colaborador}" method="post">

        <div class="form-group">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" th:field="*{nome}" placeholder="Ex: Igor Silva" required />
        </div>

        <div class="form-group">
            <label for="email">E-mail Profissional</label>
            <input type="email" id="email" th:field="*{email}" placeholder="email@empresa.com" required />
        </div>

        <div class="form-group">
            <label for="imgUrl">URL da Foto de Perfil</label>
            <input type="text" id="imgUrl" th:field="*{imgUrl}" placeholder="https://..." required />
        </div>

        <div class="form-group">
            <label for="funcao">Função</label>
            <input type="text" id="funcao" th:field="*{funcao}" placeholder="Digite a função" required />
        </div>

        <div class="form-group">
            <label for="modeloContratacao">Modelo de Contratação</label>
            <input type="text" id="modeloContratacao" th:field="*{modeloContratacao}" placeholder="Ex: CLT, PJ ou Estágio" />
        </div>

        <button type="submit" class="btn-submit">Cadastrar Colaborador</button>
    </form>
</div>

    <a th:href="@{/colaboradores/ui/listar}" class="btn-back">← Voltar para a lista</a>

</body>
</html>
